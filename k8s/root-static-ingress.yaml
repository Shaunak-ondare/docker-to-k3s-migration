apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumina-root-static
  namespace: dev
spec:
  rules:
  - http:
      paths:
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: lumina-service
            port:
              number: 80
      - path: /favicon.svg
        pathType: Exact
        backend:
          service:
            name: lumina-service
            port:
              number: 80
      - path: /icons.svg
        pathType: Exact
        backend:
          service:
            name: lumina-service
            port:
              number: 80
      - path: /vite.svg
        pathType: Exact
        backend:
          service:
            name: lumina-service
            port:
              number: 80
